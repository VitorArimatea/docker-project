services:
  # 1. Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: docker_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      # Não expõe a porta para o host, mas mantemos documentado que a interna é 3306
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network

  # 2. Backend API Python
  api:
    build: ./api
    container_name: docker_api
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: app_db
    ports:
      - "5000"
    depends_on:
      - db
    networks:
      - backend-network
      - frontend-network

  # 3. Frontend Servidor Web
  frontend:
    image: nginx:alpine
    container_name: docker_frontend
    restart: always
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80"
    networks:
      - frontend-network

  # 4. Proxy Reverso
  proxy:
    image: nginx:alpine
    container_name: docker_proxy
    restart: always
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - frontend
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  db_data:
