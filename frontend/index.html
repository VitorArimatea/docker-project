<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários - Docker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Usuários</h1>
            <p>Infraestrutura com Docker, Nginx, Python (Flask) e MySQL</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Cadastrar Novo Usuário</h2>
                <form id="user-form">
                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" name="name" required placeholder="Digite o nome">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder="Digite o e-mail">
                    </div>
                    <button type="submit" class="btn">Cadastrar Usuário</button>
                    <div id="form-message" class="message"></div>
                </form>
            </section>

            <section class="list-section">
                <h2>Usuários Cadastrados</h2>
                <div class="table-container">
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Data de Cadastro</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- Os usuários serão renderizados aqui pelo JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
