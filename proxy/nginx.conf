server {
    listen 80;
    server_name localhost;

    # Logs de acesso e erro (útil para análise e debug)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Roteamento para a API
    location /api/ {
        # O Nginx vai remover o /api e repassar para a raiz da API (Flask) na porta 5000
        # Ex: http://localhost/api/users -> http://api:5000/users
        proxy_pass http://api:5000/;
        
        # Headers importantes para proxy reverso
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Roteamento para o Frontend
    location / {
        # Roteia para o serviço frontend (Nginx estático) na porta 80 interna
        proxy_pass http://frontend:80/;
        
        # Headers importantes para proxy reverso
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
